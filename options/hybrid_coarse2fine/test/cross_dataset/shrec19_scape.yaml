# general setting
backend: dp # DataParallel
type: Hybrid_Self_Supervised_Model
num_gpu: 1 # 这里设置1, 表示只在单卡上运行， 不要改动
gpu_idx: 7 # 指定运行下标
manual_seed: 1234
n_lb: 140
n_elas: 60
non-isometric: false
partial: false
visualize: true

# path
path:
  resume_state: experiments/hybrid_self_supervised/scape/models/19000.pth
  resume: false

# datasets
datasets:
  test_dataset:
    name: Shrec19Val
    type: PairShrec19Dataset
    phase: test
    data_root: ../data/SHREC19_r
    return_evecs: true
    return_faces: true
    num_evecs: 200
    return_dist: true
    return_elas_evecs: true
    bending_weight: 0.01
networks:
  feature_extractor:
    type: DiffusionNet
    in_channels: 16
    out_channels: 128
    cache_dir: ../data/SHREC19_r/diffusion
    input_type: hks
  permutation:
    type: Similarity
    tau: 0.07
    hard: true

