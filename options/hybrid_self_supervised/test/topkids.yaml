# general setting
backend: dp # DataParallel
type: Hybrid_Self_Supervised_Model
num_gpu: 1 # 这里设置1, 表示只在单卡上运行， 不要改动
gpu_idx: 6 # 指定运行下标
manual_seed: 1234
n_lb: 140
n_elas: 60
# refine: 15
non-isometric: false
partial: false
visualize: true #true

# path
path:
  resume_state: checkpoints/ours/topkids/models/12000.pth
  resume: false

# datasets
datasets:
  test_dataset:
    name: Val
    type: PairTopKidsDataset
    phase: test
    data_root: ../data/TOPKIDS/
    return_evecs: true
    return_faces: true
    num_evecs: 200
    return_dist: true
    return_elas_evecs: true
    bending_weight: 0.01
networks:
  feature_extractor:
    type: DiffusionNet
    in_channels: 16
    out_channels: 128
    cache_dir: ../data/TOPKIDS/diffusion
    input_type: hks
  permutation:
    type: Similarity
    tau: 0.07
    hard: true

