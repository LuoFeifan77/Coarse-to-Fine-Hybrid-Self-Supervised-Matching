# general setting
backend: dp # DataParallel
type: Hybrid_Self_Supervised_Model
num_gpu: 1 # 
gpu_idx: 5 # 
manual_seed: 1234
n_lb: 140
n_elas: 60
non-isometric: true
partial: false
visualize: true

# path
path:
  resume_state: checkpoints/ours/dt4d/models/24000.pth  #checkpoints/hybrid_ulrssm/dt4d.pth
  resume: false

# datasets
datasets:
  test_dataset:
    name: Val
    type: PairDT4DDataset
    phase: test
    data_root: ../data/DT4D_r/
    inter_class: true
    return_evecs: true
    return_faces: true
    num_evecs: 200
    return_corr: true
    return_dist: true
    return_elas_evecs: true
    bending_weight: 0.01
networks:
  feature_extractor:
    type: DiffusionNet
    in_channels: 16
    out_channels: 128
    cache_dir: ../data/DT4D_r/diffusion
    input_type: hks
  # permutation:
  #   type: Similarity
  #   tau: 0.07
  #   hard: true

# training setting
train:
  optims:
    feature_extractor:
      type: Adam
      lr: 1.0e-3
  schedulers:
    feature_extractor:
      type: none
  losses:
    ##lb loss terms
    functional_map_loss:  # key loss
      type: FunctionalMapLoss
      w_orth: 1.0
      w_bij: 1.0
    spatial_contrast_loss:
      type: SpatialContrastiveLoss
      w_cross: 1.0  
      w_self: 0.5  
    ##elas loss terms
    elas_functional_map_loss:  # key loss
      type: ElasFunctionalMapLoss
      w_elas_orth: 1.0
      w_elas_bij: 1.0
    elas_spatial_contrast_loss:
      type: ElasSpatialContrastiveLoss
      w_elas_cross: 1.0 
      w_elas_self: 0.5 
    dirichlet_loss:
      type: DirichletLoss
      loss_weight: 5.0

# validation setting
val:
  save_geo_errors: true
  metrics:
    geo_error:
      type: calculate_geodesic_error
    # plot_pck_per_pair:
    #   type: plot_pck_multiple
    plot_pck:
      type: plot_pck
