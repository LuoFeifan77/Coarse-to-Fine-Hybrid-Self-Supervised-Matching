# validation setting
val:
  save_geo_errors: true
  metrics:
    geo_error:
      type: calculate_geodesic_error
    # plot_pck_per_pair:
    #   type: plot_pck_multiple  # 到时候曲线也可以用上
    plot_pck:
      type: plot_pck