# general setting
backend: dp # DataParallel
type: Hybrid_Self_Supervised_Model
num_gpu: 1 
gpu_idx: 3
manual_seed: 1234
non-isometric: false
n_lb: 140
n_elas: 60
partial: false
visualize: false

# path
path:
  resume_state: checkpoints/ours/faust/models/60000.pth
  resume: false

# datasets
datasets:
  test_dataset:
    name: FaustVal
    type: PairDataset
    # phase: test
    data_root: ../data/FAUST_a/
    return_evecs: true
    return_faces: true
    num_evecs: 200
    return_corr: true
    return_dist: true
    return_elas_evecs: true
    bending_weight: 0.01

networks:
  feature_extractor:
    type: DiffusionNet
    in_channels: 16
    out_channels: 128
    cache_dir: ../data/FAUST_a/diffusion
    input_type: hks
  permutation:
    type: Similarity
    tau: 0.07
    hard: true

