  #   name: ScapeVal
  #   type: PairDataset
  #   # phase: test
  #   data_root: ../data/SCAPE_a/
  #   return_evecs: true
  #   return_faces: true
  #   num_evecs: 200
  #   return_corr: true
  #   return_dist: true
  #   return_elas_evecs: true
  #   bending_weight: 0.01

  # test_dataset:
  #   name: Shrec19Test
