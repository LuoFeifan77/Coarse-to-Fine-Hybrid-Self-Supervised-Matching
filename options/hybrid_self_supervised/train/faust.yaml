backend: dp # DataParallel
type: Hybrid_Self_Supervised_Model
num_gpu: 1 # 
gpu_idx: 5 # 
manual_seed: 1234
non-isometric: false
partial: false
n_lb: 140
n_elas: 60
path:
  resume_state:

# datasets
datasets:
  train_dataset:
    name: FaustTrain
    type: PairFaustDataset
    phase: train
    data_root: ../data/FAUST_r
    return_evecs: true
    return_faces: true
    num_evecs: 200
    return_corr: false
    return_dist: false
    return_elas_evecs: true
    bending_weight: 0.01
  test_dataset:
    name: FaustTest
    type: PairFaustDataset
    phase: test
    data_root: ../data/FAUST_r
    return_evecs: true
    return_faces: true
    num_evecs: 200
    return_corr: true
    return_dist: true
    return_elas_evecs: true
    bending_weight: 0.01
