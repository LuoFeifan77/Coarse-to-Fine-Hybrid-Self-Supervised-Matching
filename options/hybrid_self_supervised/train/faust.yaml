  #   return_elas_evecs: true
  #   bending_weight: 0.01
  batch_size: 1
  num_worker: 16

# network setting
networks:
  feature_extractor:
    type: DiffusionNet
    in_channels: 16
    out_channels: 128
    cache_dir: ../data/FAUST_r/diffusion
    input_type: hks
  permutation:
    type: Similarity
    tau: 0.07

# training setting
train:
  total_epochs: 10
  optims:
    feature_extractor:
      type: Adam
      lr: 1.0e-3
  schedulers:
    feature_extractor:
      type: CosineAnnealingLR
      eta_min: 1.0e-4
      T_max: 15
      
  losses:
    ##lb loss terms
    functional_map_loss:  # key loss
      type: FunctionalMapLoss
      w_orth: 1.0
      w_bij: 1.0
    spatial_contrast_loss:
      type: SpatialContrastiveLoss
      w_cross: 1.0  # inter contrastive
      w_self: 0.5   # intra contrastive
    ##elas loss terms
    elas_functional_map_loss:  # key loss
      type: ElasFunctionalMapLoss
      w_elas_orth: 1.0
      w_elas_bij: 1.0
    elas_spatial_contrast_loss:
      type: ElasSpatialContrastiveLoss
      w_elas_cross: 1.0  #1.0  # inter contrastive
      w_elas_self: 0.5  #1.0   # intra contrastive

val:
  val_freq: 2000
  metrics:
    geo_error:
      type: calculate_geodesic_error
    plot_pck:
      type: plot_pck

# log setting
logger:
  print_freq: 100
  save_checkpoint_freq: 2000
